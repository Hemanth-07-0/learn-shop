<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnShop - Secure Checkout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .product-option {
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .product-option:hover {
            border-color: #667eea;
            background-color: #f9f9f9;
        }

        .product-option input[type="radio"] {
            margin-right: 10px;
            cursor: pointer;
        }

        .product-option.selected {
            border-color: #667eea;
            background-color: #f0f4ff;
        }

        .product-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .product-description {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 1.3em;
            color: #667eea;
            font-weight: bold;
        }

        .summary-card {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #666;
        }

        .summary-total {
            border-top: 2px solid #ddd;
            padding-top: 10px;
            font-weight: bold;
            font-size: 1.2em;
            color: #333;
        }

        .bank-account-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #eee;
        }

        .bank-accounts-list {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .bank-account-item {
            padding: 12px;
            background: #f9f9f9;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .bank-account-info {
            flex: 1;
        }

        .bank-account-name {
            font-weight: bold;
            color: #333;
        }

        .bank-account-details {
            font-size: 0.9em;
            color: #666;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.9em;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ee5a52;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .button-group button {
            flex: 1;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .tab-button {
            padding: 10px 20px;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            color: #666;
            font-weight: 500;
            transition: all 0.3s;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .security-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
            padding: 10px;
            background: #f0f4ff;
            border-radius: 5px;
            font-size: 0.9em;
            color: #667eea;
        }

        .lock-icon {
            width: 20px;
            height: 20px;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 LearnShop</h1>
            <p>Secure Payment System</p>
        </div>

        <div id="alerts"></div>

        <div class="content">
            <!-- Left Column: Products and Customer Info -->
            <div>
                <div class="card">
                    <h2>📚 Select Course</h2>
                    <div id="products"></div>
                </div>

                <div class="card">
                    <h2>👤 Your Information</h2>
                    <form id="customerForm">
                        <div class="form-group">
                            <label for="customerName">Full Name</label>
                            <input type="text" id="customerName" required>
                        </div>
                        <div class="form-group">
                            <label for="customerEmail">Email Address</label>
                            <input type="email" id="customerEmail" required>
                        </div>
                        <div class="form-group">
                            <label for="customerAddress">Address</label>
                            <textarea id="customerAddress" rows="3" required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="customerPincode">Pincode</label>
                            <input type="text" id="customerPincode" pattern="[0-9]{4,10}" required>
                        </div>
                        <div class="form-group">
                            <label for="paymentMode">Preferred Payment Method</label>
                            <select id="paymentMode">
                                <option value="standard">Standard (All Methods)</option>
                                <option value="upi">UPI</option>
                                <option value="card">Debit/Credit Card</option>
                                <option value="netbanking">Net Banking</option>
                                <option value="wallet">Wallet</option>
                            </select>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Right Column: Summary and Payment -->
            <div>
                <div class="card">
                    <h2>💳 Order Summary</h2>
                    <div class="summary-card">
                        <div class="summary-row">
                            <span>Product:</span>
                            <span id="summaryProduct">-</span>
                        </div>
                        <div class="summary-row">
                            <span>Amount:</span>
                            <span id="summaryAmount">₹0</span>
                        </div>
                        <div class="summary-row">
                            <span>Currency:</span>
                            <span>INR</span>
                        </div>
                        <div class="summary-row summary-total">
                            <span>Total:</span>
                            <span id="summaryTotal">₹0</span>
                        </div>
                    </div>

                    <button class="btn btn-primary" id="payButton" style="width: 100%; margin-top: 20px;" disabled>
                        Proceed to Payment
                    </button>

                    <div class="security-badge">
                        <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <span>Secure payment powered by Razorpay</span>
                    </div>
                </div>

                <div class="card">
                    <h2>🏦 My Bank Accounts</h2>
                    <div class="tabs">
                        <button class="tab-button active" onclick="switchTab('bankList')">Saved Accounts</button>
                        <button class="tab-button" onclick="switchTab('bankAdd')">Add Account</button>
                    </div>

                    <div id="bankList" class="tab-content active">
                        <div id="bankAccountsList"></div>
                        <p style="color: #999; font-size: 0.9em; margin-top: 10px;" id="noAccountsMsg">No bank accounts saved yet. Add one to get started.</p>
                    </div>

                    <div id="bankAdd" class="tab-content">
                        <form id="bankAccountForm">
                            <div class="form-group">
                                <label for="bankName">Bank Name</label>
                                <input type="text" id="bankName" placeholder="e.g., HDFC Bank" required>
                            </div>
                            <div class="form-group">
                                <label for="accountHolderName">Account Holder Name</label>
                                <input type="text" id="accountHolderName" required>
                            </div>
                            <div class="form-group">
                                <label for="accountNumber">Account Number (Leave empty if using UPI)</label>
                                <input type="text" id="accountNumber" placeholder="16-digit account number">
                            </div>
                            <div class="form-group">
                                <label for="ifsc">IFSC Code</label>
                                <input type="text" id="ifsc" placeholder="e.g., HDFC0001234" pattern="[A-Z]{4}0[A-Z0-9]{6}">
                            </div>
                            <div class="form-group">
                                <label for="upiId">UPI ID (Leave empty if using account number)</label>
                                <input type="email" id="upiId" placeholder="username@bankname">
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%;">Save Bank Account</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" style="margin-bottom: 30px;">
            <h2>📋 Payment Status</h2>
            <div id="paymentStatus">
                <p style="color: #666;">Ready to make payment</p>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE = window.location.origin;
        let authToken = localStorage.getItem('authToken');
        let selectedProduct = null;
        let paymentInProgress = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            if (!authToken) {
                showAlert('You must be logged in to make a payment', 'error');
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 2000);
                return;
            }

            await loadConfig();
            await loadBankAccounts();
            setupEventListeners();
        });

        // Load configuration and products
        async function loadConfig() {
            try {
                const response = await fetch(`${API_BASE}/api/payments/config`);
                const config = await response.json();

                if (!config.configured) {
                    showAlert('Payment system not configured', 'error');
                    document.getElementById('payButton').disabled = true;
                    return;
                }

                renderProducts(config.products);
            } catch (error) {
                console.error('Error loading config:', error);
                showAlert('Failed to load products', 'error');
            }
        }

        // Render products
        function renderProducts(products) {
            const container = document.getElementById('products');
            container.innerHTML = products.map(product => `
                <div class="product-option" onclick="selectProduct(event, '${product.id}', ${product.amount}, '${product.name}')">
                    <div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-description">${product.description}</div>
                        <div class="product-price">₹${(product.amount / 100).toFixed(2)}</div>
                    </div>
                </div>
            `).join('');
        }

        // Select product
        function selectProduct(event, productId, amount, name) {
            document.querySelectorAll('.product-option').forEach(el => {
                el.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');

            selectedProduct = { id: productId, amount, name };
            updateSummary();
            document.getElementById('payButton').disabled = false;
        }

        // Update order summary
        function updateSummary() {
            if (!selectedProduct) {
                document.getElementById('summaryProduct').textContent = '-';
                document.getElementById('summaryAmount').textContent = '₹0';
                document.getElementById('summaryTotal').textContent = '₹0';
                return;
            }

            const amountInRupees = (selectedProduct.amount / 100).toFixed(2);
            document.getElementById('summaryProduct').textContent = selectedProduct.name;
            document.getElementById('summaryAmount').textContent = `₹${amountInRupees}`;
            document.getElementById('summaryTotal').textContent = `₹${amountInRupees}`;
        }

        // Setup event listeners
        function setupEventListeners() {
            document.getElementById('payButton').addEventListener('click', initiatePayment);
            document.getElementById('bankAccountForm').addEventListener('submit', addBankAccount);
            document.getElementById('customerForm').addEventListener('change', validateForm);
        }

        // Validate customer form
        function validateForm() {
            const form = document.getElementById('customerForm');
            const isValid = form.checkValidity() && selectedProduct;
            document.getElementById('payButton').disabled = !isValid;
        }

        // Initiate payment
        async function initiatePayment() {
            if (paymentInProgress) return;
            paymentInProgress = true;
            document.getElementById('payButton').disabled = true;

            try {
                if (!selectedProduct) {
                    showAlert('Please select a course', 'error');
                    return;
                }

                const customerForm = document.getElementById('customerForm');
                if (!customerForm.checkValidity()) {
                    showAlert('Please fill in all required fields', 'error');
                    return;
                }

                showAlert('Creating payment order...', 'info');

                // Create order
                const orderResponse = await fetch(`${API_BASE}/api/payments/order`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`,
                    },
                    body: JSON.stringify({
                        productId: selectedProduct.id,
                        paymentMode: document.getElementById('paymentMode').value,
                        customerContact: document.getElementById('customerEmail').value,
                    }),
                });

                if (!orderResponse.ok) {
                    const error = await orderResponse.json();
                    throw new Error(error.message || 'Failed to create order');
                }

                const orderData = await orderResponse.json();
                updatePaymentStatus('pending', 'Order created. Opening Razorpay...');

                // Get Razorpay key
                const configResponse = await fetch(`${API_BASE}/api/payments/config`);
                const config = await configResponse.json();

                // Razorpay checkout options
                const options = {
                    key: config.keyId,
                    amount: selectedProduct.amount,
                    currency: 'INR',
                    name: 'LearnShop',
                    description: selectedProduct.name,
                    order_id: orderData.orderId,
                    handler: async (response) => {
                        await verifyPayment(response, selectedProduct.id);
                    },
                    prefill: {
                        name: document.getElementById('customerName').value,
                        email: document.getElementById('customerEmail').value,
                    },
                    theme: {
                        color: '#667eea',
                    },
                    modal: {
                        ondismiss: () => {
                            paymentInProgress = false;
                            document.getElementById('payButton').disabled = false;
                            updatePaymentStatus('cancelled', 'Payment cancelled by user');
                        },
                    },
                };

                // Load Razorpay script
                const script = document.createElement('script');
                script.src = 'https://checkout.razorpay.com/v1/checkout.js';
                script.onload = () => {
                    const razorpay = new Razorpay(options);
                    razorpay.open();
                };
                document.head.appendChild(script);
            } catch (error) {
                console.error('Payment initiation failed:', error);
                showAlert(error.message || 'Failed to initiate payment', 'error');
                paymentInProgress = false;
                document.getElementById('payButton').disabled = false;
            }
        }

        // Verify payment
        async function verifyPayment(razorpayResponse, productId) {
            try {
                updatePaymentStatus('verifying', 'Verifying payment...');

                const response = await fetch(`${API_BASE}/api/payments/verify`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`,
                    },
                    body: JSON.stringify({
                        orderId: razorpayResponse.razorpay_order_id,
                        productId: productId,
                        razorpay_payment_id: razorpayResponse.razorpay_payment_id,
                        razorpay_signature: razorpayResponse.razorpay_signature,
                        paymentMode: document.getElementById('paymentMode').value,
                    }),
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Payment verification failed');
                }

                const result = await response.json();
                updatePaymentStatus('success', `Payment verified! Receipt: ${result.receiptNumber}`);
                showAlert(`✅ Payment successful! Receipt: ${result.receiptNumber}`, 'success');

                // Download receipt
                setTimeout(() => {
                    window.location.href = result.receiptUrl;
                }, 2000);
            } catch (error) {
                console.error('Payment verification failed:', error);
                updatePaymentStatus('failed', error.message || 'Payment verification failed');
                showAlert(error.message || 'Payment could not be verified', 'error');
            } finally {
                paymentInProgress = false;
                document.getElementById('payButton').disabled = false;
            }
        }

        // Update payment status
        function updatePaymentStatus(status, message) {
            const statusMap = {
                pending: 'status-pending',
                verifying: 'status-pending',
                success: 'status-success',
                failed: 'status-error',
                cancelled: 'status-pending',
            };

            document.getElementById('paymentStatus').innerHTML = `
                <div style="display: flex; align-items: center; gap: 10px;">
                    ${status === 'verifying' || status === 'pending' ? '<div class="loading"></div>' : ''}
                    <span class="status-badge ${statusMap[status] || ''}">${status.toUpperCase()}</span>
                    <span>${message}</span>
                </div>
            `;
        }

        // Bank account functions
        async function loadBankAccounts() {
            try {
                const response = await fetch(`${API_BASE}/api/bank-accounts`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                    },
                });

                if (response.ok) {
                    const data = await response.json();
                    renderBankAccounts(data.accounts);
                }
            } catch (error) {
                console.error('Error loading bank accounts:', error);
            }
        }

        function renderBankAccounts(accounts) {
            const container = document.getElementById('bankAccountsList');
            const noMsg = document.getElementById('noAccountsMsg');

            if (accounts.length === 0) {
                container.innerHTML = '';
                noMsg.style.display = 'block';
                return;
            }

            noMsg.style.display = 'none';
            container.innerHTML = accounts.map(account => `
                <div class="bank-account-item">
                    <div class="bank-account-info">
                        <div class="bank-account-name">${account.bankName}</div>
                        <div class="bank-account-details">
                            ${account.accountHolderName} • 
                            ${account.accountNumberMasked || account.upiId || 'N/A'}
                        </div>
                        ${account.ifsc ? `<div class="bank-account-details">IFSC: ${account.ifsc}</div>` : ''}
                    </div>
                    <button class="btn btn-danger btn-small" onclick="deleteBankAccount('${account.id}')">Delete</button>
                </div>
            `).join('');
        }

        async function addBankAccount(e) {
            e.preventDefault();

            try {
                const formData = {
                    bankName: document.getElementById('bankName').value,
                    accountHolderName: document.getElementById('accountHolderName').value,
                    accountNumber: document.getElementById('accountNumber').value,
                    ifsc: document.getElementById('ifsc').value,
                    upiId: document.getElementById('upiId').value,
                };

                if (!formData.accountNumber && !formData.upiId) {
                    showAlert('Please enter either account number or UPI ID', 'error');
                    return;
                }

                const response = await fetch(`${API_BASE}/api/bank-accounts`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`,
                    },
                    body: JSON.stringify(formData),
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Failed to add bank account');
                }

                showAlert('✅ Bank account added successfully', 'success');
                document.getElementById('bankAccountForm').reset();
                await loadBankAccounts();
            } catch (error) {
                console.error('Error adding bank account:', error);
                showAlert(error.message || 'Failed to add bank account', 'error');
            }
        }

        async function deleteBankAccount(accountId) {
            if (!confirm('Are you sure you want to delete this bank account?')) return;

            try {
                const response = await fetch(`${API_BASE}/api/bank-accounts/${accountId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                    },
                });

                if (!response.ok) {
                    throw new Error('Failed to delete bank account');
                }

                showAlert('✅ Bank account deleted', 'success');
                await loadBankAccounts();
            } catch (error) {
                console.error('Error deleting bank account:', error);
                showAlert('Failed to delete bank account', 'error');
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(el => {
                el.classList.remove('active');
            });

            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function showAlert(message, type) {
            const container = document.getElementById('alerts');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            container.appendChild(alert);

            setTimeout(() => {
                alert.remove();
            }, 5000);
        }
    </script>
</body>
</html>
